  <body>
    <div id="root"></div>
    <script>
      (function () {
        var installPrompt = null;
        window.__lashPwa = {
          getInstallPrompt: function () { return installPrompt; },
          clearInstallPrompt: function () { installPrompt = null; },
        };
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          installPrompt = e;
          window.dispatchEvent(new CustomEvent('lash-pwa-install-ready'));
        });
        window.__lashPwaApplyUpdate = function () {
          if (!('serviceWorker' in navigator)) return Promise.resolve();
          return navigator.serviceWorker.getRegistration().then(function (reg) {
            if (reg && reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          });
        };
        var refreshing = false;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        }
        window.addEventListener('load', function () {
          if (!('serviceWorker' in navigator)) return;
          navigator.serviceWorker.register('/service-worker.js', { updateViaCache: 'none' }).then(function (reg) {
            var triggerUpdateCheck = function () {
              reg.update().catch(function () {});
            };
            triggerUpdateCheck();
            window.addEventListener('focus', triggerUpdateCheck);
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') triggerUpdateCheck();
            });
            setInterval(triggerUpdateCheck, 5 * 60 * 1000);

            if (reg.waiting && navigator.serviceWorker.controller) {
              window.dispatchEvent(new CustomEvent('lash-pwa-update-ready'));
            }
            reg.addEventListener('updatefound', function () {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', function () {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('lash-pwa-update-ready'));
                }
              });
            });
          }).catch(function () {});
        });
      })();
    </script>
